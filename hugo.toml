baseURL = "https://tai-yng.github.io/"
languageCode = "zh-cn"
title = "太阳的博客"
theme = "PaperMod"
paginate = 10
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "太阳的博客"
  description = "记录生活、技术与思考，分享那些值得被看见的瞬间。"
  keywords = ["博客", "生活", "技术", "思考"]
  author = "taiyang"
  # 头像图片，放在 static/images/ 目录下
  # images = ["/images/avatar.jpg"]

  defaultTheme = "auto"
  disableThemeToggle = false

  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  ShowToc = true
  TocOpen = false
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  # 首页模式：profile（个人名片）/ home（带封面）
  [params.homeInfoParams]
    Title = "你好，我是 taiyang 👋"
    Content = """
欢迎来到我的小角落。

这里记录着我的**生活随笔**、**技术探索**和**一些思考**。  
每篇文字都是一个真实的瞬间，希望能与你产生共鸣。

> 生活不止眼前的苟且，还有诗和远方——以及写不完的 Bug。
"""

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/Tai-Yng"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  # 搜索相关
  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    limit = 10
    keys = ["title", "permalink", "summary", "content"]

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 20

  [[menu.main]]
    identifier = "categories"
    name = "分类"
    url = "/categories/"
    weight = 30

  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 40

  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 50

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    anchorLineNos = true
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "monokai"

[outputs]
  home = ["HTML", "RSS", "JSON"]
