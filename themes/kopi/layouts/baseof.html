<!DOCTYPE html>
<html lang="{{ or .Site.Language.LanguageCode .Site.Language.Lang }}">
<head>
    {{ partial "head.html" . }}
</head>
<body>
    {{ partial "welcome.html" . }}
    {{ partial "header.html" . }}

    <div class="main-wrapper">
        <div class="container">
            {{ block "main" . }}{{ end }}
        </div>
    </div>

    {{ partial "footer.html" . }}
    
    {{ if .IsHome }}
    <script>
    (function() {
        const welcome = document.getElementById('welcome');
        if (!welcome) return;
        
        const hasSeenWelcome = sessionStorage.getItem('hasSeenWelcome');
        if (hasSeenWelcome) {
            welcome.classList.add('hidden');
        }
        
        function enterSite() {
            welcome.classList.add('hidden');
            sessionStorage.setItem('hasSeenWelcome', 'true');
            const banner = document.getElementById('heroBanner');
            if (banner) {
                setTimeout(() => {
                    const bannerHeight = banner.offsetHeight;
                    window.scrollTo({ top: bannerHeight + 10, behavior: 'smooth' });
                }, 400);
            }
        }
        
        function showWelcome() {
            welcome.classList.remove('hidden');
            sessionStorage.removeItem('hasSeenWelcome');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        const welcomeEnter = document.getElementById('welcomeEnter');
        if (welcomeEnter) {
            welcomeEnter.addEventListener('click', enterSite);
        }
        
        window.addEventListener('wheel', function(e) {
            if (e.deltaY > 50 && !welcome.classList.contains('hidden')) enterSite();
        }, { passive: true });
        
        window.addEventListener('keydown', function(e) {
            if ((e.key === 'Enter' || e.key === ' ') && !welcome.classList.contains('hidden')) enterSite();
        });
        
        // Click hero banner to return to welcome
        const heroBanner = document.getElementById('heroBanner');
        if (heroBanner) {
            heroBanner.addEventListener('click', function() {
                if (!welcome.classList.contains('hidden')) return;
                showWelcome();
            });
        }
    })();
    </script>
    {{ end }}
    
    {{ if .Store.Get "hasMermaid" }}
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.esm.min.mjs';

        const getTheme = () => document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'neutral';

        mermaid.initialize({ startOnLoad: false, theme: getTheme() });

        document.querySelectorAll('.mermaid').forEach(el => {
            el.setAttribute('data-source', el.textContent);
        });

        await mermaid.run({ querySelector: '.mermaid' });

        new MutationObserver(async (mutations) => {
            if (mutations.some(m => m.attributeName === 'data-theme')) {
                mermaid.initialize({ startOnLoad: false, theme: getTheme() });
                document.querySelectorAll('.mermaid').forEach(el => {
                    el.removeAttribute('data-source');
                    el.textContent = el.getAttribute('data-source');
                });
                await mermaid.run({ querySelector: '.mermaid' });
            }
        }).observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
    </script>
    {{ end }}

</body>
</html>
