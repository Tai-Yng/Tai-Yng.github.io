{{ if .IsHome }}
<section class="welcome-screen" id="welcome">
    <div class="welcome-bg" style="background-image: url('{{ "images/hero-bg.jpg" | absURL }}');"></div>
    <div class="welcome-overlay"></div>
    <div class="welcome-content">
        <h1 class="welcome-title">{{ .Site.Params.heroTitle | default "「 湖心亭看雪 」" }}</h1>
        <p class="welcome-subtitle">{{ .Site.Params.heroSubtitle | default "天与云与山与水，上下一白" }}</p>
        <button class="welcome-enter" id="welcomeEnter">
            <span>进入博客</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>
        </button>
    </div>
    <div class="welcome-scroll-hint">
        <span>滚动进入</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>
    </div>
</section>
{{ end }}
