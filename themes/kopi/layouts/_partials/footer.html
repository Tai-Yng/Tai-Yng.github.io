<!-- Toast Container -->
<div id="toastContainer" class="toast-container"></div>

<!-- Cookie Consent Banner -->
<div id="cookieBanner" class="cookie-banner">
    <div class="cookie-content">
        <h4>Cookie Policy</h4>
        <p>We use cookies to improve your experience and analyze site traffic.</p>
    </div>
    <div class="cookie-actions">
        <button class="btn btn-accept" id="btnAcceptCookies">Accept</button>
        <button class="btn btn-decline" id="btnDeclineCookies">Decline</button>
    </div>
</div>

<footer class="site-footer">
    <div class="container footer-content">
        <div>
            <strong class="footer-title">{{ .Site.Title }}</strong>
            {{ with .Site.Params.subtitle }}
                <span class="footer-subtitle">{{ . }}</span>
            {{ end }}
            <p>&copy; {{ now.Year }} {{ .Site.Title }}</p>
        </div>
        <div style="display:flex; gap: 1.5rem;">
            <a href="#">Twitter</a>
            <a href="#">Instagram</a>
            <a href="#">RSS</a>
        </div>
        <!-- Busuanzi Visit Counter -->
        <div class="busuanzi-container">
            <span class="busuanzi-item">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                <span id="busuanzi_value_site_uv">-</span> Visitors
            </span>
            <span class="busuanzi-divider">|</span>
            <span class="busuanzi-item">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                <span id="busuanzi_value_site_pv">-</span> Views
            </span>
        </div>
    </div>
</footer>

<!-- Busuanzi Script -->
<script src="//busuanzi.buv.vn/uv3/browse.min.js"></script>

<!-- Back to Top Button -->
<button id="backToTop" class="back-to-top" aria-label="Back to Top">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
</button>
