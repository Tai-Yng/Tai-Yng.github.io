{{ if .IsHome }}
<section class="hero-section">
    <div class="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <h1 class="hero-title">{{ .Site.Params.heroTitle | default "「 湖心亭看雪 」" }}</h1>
        <p class="hero-subtitle">{{ .Site.Params.heroSubtitle | default "天与云与山与水，上下一白" }}</p>
        {{ with .Site.Params.heroAuthor }}
        <p class="hero-author">{{ . }}</p>
        {{ end }}
    </div>
    <a href="#content" class="hero-scroll" aria-label="Scroll to content">
        <span>SCROLL</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
    </a>
</section>
{{ end }}
